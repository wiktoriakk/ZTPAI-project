<div class="login-wrapper">
  <div class="login-card">
    <div class="login-logo">
      <div class="dot"></div>
      <span>ShopManager</span>
    </div>

    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to your account to continue</p>

    <div *ngIf="error" class="error-msg">
      <span>⚠</span> {{ error }}
    </div>

    <div class="form-group">
      <label for="username">Username</label>
      <input id="username" type="text" [(ngModel)]="username" placeholder="Enter username" autocomplete="username" />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" [(ngModel)]="password" placeholder="Enter password" autocomplete="current-password" />
    </div>

    <button (click)="onSubmit()" [disabled]="loading || !username.trim() || !password.trim()">
      {{ loading ? 'Signing in...' : 'Sign In →' }}
    </button>
  </div>
</div>
