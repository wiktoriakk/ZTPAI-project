<div class="page">
  <header class="topbar">
    <h1>Products</h1>
    <div class="topbar-right">
      <span class="role-badge" [class.admin]="isAdmin">{{ isAdmin ? 'ADMIN' : 'USER' }}</span>
      <button class="btn-logout" (click)="logout()">Log out</button>
    </div>
  </header>

  <main class="content">

    <div *ngIf="isAdmin" class="card add-form">
      <h2>Add Product</h2>
      <div *ngIf="createError" class="msg error">{{ createError }}</div>
      <div *ngIf="createSuccess" class="msg success">Product created successfully.</div>
      <div class="form-row">
        <input [(ngModel)]="newProduct.name" placeholder="Name" />
        <input [(ngModel)]="newProduct.price" type="number" min="0" placeholder="Price" />
        <input [(ngModel)]="newProduct.description" placeholder="Description (optional)" />
        <button class="btn-primary"
                (click)="onCreateProduct()"
                [disabled]="creating || !newProduct.name.trim() || newProduct.price < 0">
          {{ creating ? 'Saving...' : 'Add' }}
        </button>
      </div>
    </div>

    <div class="card">
      <div *ngIf="loading" class="state-msg">Loading...</div>
      <div *ngIf="error" class="msg error">{{ error }}</div>

      <table *ngIf="!loading && !error && products.length > 0">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
            <th>Description</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let p of products">
            <td>{{ p.id }}</td>
            <td>{{ p.name }}</td>
            <td>{{ p.price | currency }}</td>
            <td>{{ p.description || '—' }}</td>
          </tr>
        </tbody>
      </table>

      <p *ngIf="!loading && !error && products.length === 0" class="state-msg">No products found.</p>
    </div>

  </main>
</div>
